name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Thank you for reporting a bug. Please fill out the template to help us understand and reproduce the issue.

        **Important**: FileENIAC is a local-first app. If your bug involves sensitive data, do not include real paths, tokens, or credentials in this report.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug here
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        Steps to reproduce the behavior:
        1. Go to '...'
        2. Click on '...'
        3. See error
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: FileENIAC Version
      description: Run `fileeniac --version` or check the installer name
      placeholder: e.g., v0.1.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Docker
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Paste relevant log output here. Do NOT include credentials, tokens, or real file paths.
        Run with `RUST_LOG=debug` or check logs in `$FILEENIAC_DATA_DIR/logs/`
      placeholder: |
        [paste log output here]
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the problem (workarounds, environment details)
      placeholder: Additional context
    validations:
      required: false