name: Feature Request
description: Request a new feature or enhancement
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Have an idea for a new feature? We'd love to hear it!

        Before opening a feature request, please check:
        - [ ] The roadmap in `docs/NEXT_SPRINTS.md` to see if it's already planned
        - [ ] Existing issues to avoid duplicates

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Describe the problem you're trying to solve. What workflow is missing?
      placeholder: Describe the problem
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution or how the feature should work
      placeholder: Describe your solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions you've considered
      placeholder: Alternatives
    validations:
      required: false

  - type: textarea
    id: use-cases
    attributes:
      label: Use Cases
      description: List specific use cases where this feature would be valuable
      placeholder: |
        - As a [user], I want to [do X] so that [I can achieve Y]
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - Low (nice to have)
        - Medium (would improve my workflow)
        - High (blocking my use case)
        - Critical (urgent need)
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references
      placeholder: Additional context
    validations:
      required: false