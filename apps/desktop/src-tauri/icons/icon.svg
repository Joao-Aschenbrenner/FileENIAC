<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset in="blur" dx="0" dy="2" result="offsetBlur"/>
      <feFlood flood-color="#60a5fa" flood-opacity="0.4"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Subtle grid pattern for depth -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="128" y1="32" x2="128" y2="480"/>
    <line x1="224" y1="32" x2="224" y2="480"/>
    <line x1="320" y1="32" x2="320" y2="480"/>
    <line x1="32" y1="128" x2="480" y2="128"/>
    <line x1="32" y1="224" x2="480" y2="224"/>
    <line x1="32" y1="320" x2="480" y2="320"/>
  </g>

  <!-- Main file/document shape - back layer -->
  <g filter="url(#innerGlow)">
    <!-- Back document -->
    <path d="M 160 130 L 160 370 L 352 370 L 352 170 L 310 130 Z"
          fill="url(#accent)" opacity="0.7" rx="8"/>
    <!-- Corner fold -->
    <path d="M 310 130 L 310 170 L 352 170 Z" fill="#1e3a5f" opacity="0.5"/>

    <!-- Front document - offset -->
    <path d="M 140 155 L 140 390 L 372 390 L 372 195 L 330 155 Z"
          fill="url(#glow)" rx="8"/>
    <!-- Corner fold front -->
    <path d="M 330 155 L 330 195 L 372 195 Z" fill="#1e3a5f" opacity="0.4"/>

    <!-- File lines on front document -->
    <rect x="175" y="220" width="140" height="6" rx="3" fill="#fff" opacity="0.5"/>
    <rect x="175" y="240" width="110" height="6" rx="3" fill="#fff" opacity="0.4"/>
    <rect x="175" y="260" width="130" height="6" rx="3" fill="#fff" opacity="0.35"/>
    <rect x="175" y="280" width="90" height="6" rx="3" fill="#fff" opacity="0.3"/>
    <rect x="175" y="300" width="120" height="6" rx="3" fill="#fff" opacity="0.25"/>
  </g>

  <!-- Deployment arrow / flow symbol -->
  <g transform="translate(320, 300)">
    <!-- Arrow body -->
    <path d="M 0 0 L 60 0 L 50 -14 L 50 -6 L 20 -6 L 20 6 L 50 6 L 50 14 L 60 0 Z"
          fill="#60a5fa" opacity="0.9" transform="rotate(-45)"/>
  </g>

  <!-- Connection nodes - representing network/deploy -->
  <circle cx="390" cy="140" r="8" fill="#60a5fa" opacity="0.8"/>
  <circle cx="420" cy="180" r="5" fill="#3b82f6" opacity="0.6"/>
  <circle cx="370" cy="110" r="5" fill="#3b82f6" opacity="0.6"/>
  <!-- Connection lines -->
  <line x1="390" y1="140" x2="420" y2="180" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>
  <line x1="390" y1="140" x2="370" y2="110" stroke="#60a5fa" stroke-width="2" opacity="0.4"/>

  <!-- Small sparkle/precision dot -->
  <circle cx="410" cy="130" r="3" fill="#93c5fd" opacity="0.7"/>
</svg>
