services:
  fileeniac:
    image: enisystems/fileeniac:latest
    container_name: FileENIAC
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - fileeniac-data:/data
    environment:
      - FILEENIAC_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  fileeniac-data:
    name: FileENIAC_Data
